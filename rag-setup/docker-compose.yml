services:
  # PostgreSQL with pgvector for vector storage
  postgres:
    image: pgvector/pgvector:pg15
    container_name: chimera-postgres
    restart: on-failure
    environment:
      POSTGRES_DB: chimera_rag
      POSTGRES_USER: chimera
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chimera -d chimera_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - rag-network

  # Text Embeddings Inference for vectorization
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: chimera-tei
    restart: on-failure
    environment:
      MODEL_ID: sentence-transformers/all-MiniLM-L6-v2
      DTYPE: float32
    volumes:
      - tei_cache:/root/.cache
    ports:
      - "8001:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - rag-network

  # SearXNG - Privacy-respecting meta search engine
  searxng:
    image: searxng/searxng:latest
    container_name: chimera-searxng
    restart: on-failure
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
      - searxng_data:/etc/searxng
    ports:
      - "8888:8080"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - rag-network

  # Custom RAG Orchestrator
  rag-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chimera-rag-server
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      tei:
        condition: service_healthy
      searxng:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: chimera
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_DB: chimera_rag
      POSTGRES_PORT: 5432
      TEI_URL: http://tei:80
      SEARXNG_URL: http://searxng:8080
      LM_STUDIO_URL: http://host.docker.internal:1234
      LOG_LEVEL: INFO
    volumes:
      - rag_data:/app/data
      - ./documents:/app/documents
    ports:
      - "8080:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  postgres_data:
  tei_cache:
  rag_data:
  searxng_data:
